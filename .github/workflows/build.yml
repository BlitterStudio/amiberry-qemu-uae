name: Build qemu-uae

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Publish a GitHub Release from the produced assets'
        required: false
        default: false
        type: boolean
      release_tag:
        description: 'Release tag to publish when publish_release is true'
        required: false
        type: string
      draft_release:
        description: 'Create the manually published release as a draft'
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  linux:
    name: Linux ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    container: ubuntu:22.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm

    steps:
      - name: Install checkout tools
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y ca-certificates git

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y \
            build-essential \
            curl \
            ninja-build \
            patch \
            pkg-config \
            python3 \
            python3-venv \
            xz-utils \
            libglib2.0-dev \
            libpixman-1-dev \
            zlib1g-dev

      - name: Check script syntax
        run: bash -n build-qemu-uae-plugin.sh

      - name: Build plugin
        run: ./build-qemu-uae-plugin.sh --clean -j "$(nproc)" --output dist/qemu-uae.so

      - name: Package release asset
        run: |
          tar -C dist -cJf "dist/qemu-uae-linux-${{ matrix.arch }}.tar.xz" qemu-uae.so

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v7
        with:
          name: qemu-uae-linux-${{ matrix.arch }}
          path: dist/qemu-uae.so
          if-no-files-found: error

      - name: Upload release package
        uses: actions/upload-artifact@v7
        with:
          name: package-qemu-uae-linux-${{ matrix.arch }}
          path: dist/qemu-uae-linux-${{ matrix.arch }}.tar.xz
          if-no-files-found: error

  macos:
    name: macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          brew install ninja pkg-config glib

      - name: Check script syntax
        run: bash -n build-qemu-uae-plugin.sh

      - name: Build plugin
        run: ./build-qemu-uae-plugin.sh --clean -j "$(sysctl -n hw.ncpu)" --output dist/qemu-uae.dylib

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: qemu-uae-macos-${{ matrix.arch }}
          path: dist/qemu-uae.dylib
          if-no-files-found: error

  macos-universal:
    name: macOS universal
    runs-on: macos-15
    needs: macos

    steps:
      - name: Download x86_64 plugin
        uses: actions/download-artifact@v8
        with:
          name: qemu-uae-macos-x86_64
          path: artifacts/x86_64

      - name: Download arm64 plugin
        uses: actions/download-artifact@v8
        with:
          name: qemu-uae-macos-arm64
          path: artifacts/arm64

      - name: Create universal plugin
        run: |
          mkdir -p dist
          lipo -create \
            artifacts/x86_64/qemu-uae.dylib \
            artifacts/arm64/qemu-uae.dylib \
            -output dist/qemu-uae.dylib
          lipo -info dist/qemu-uae.dylib

      - name: Package release asset
        run: |
          (cd dist && ditto -c -k --sequesterRsrc --keepParent qemu-uae.dylib qemu-uae-macos-universal.zip)

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: qemu-uae-macos-universal
          path: dist/qemu-uae.dylib
          if-no-files-found: error

      - name: Upload release package
        uses: actions/upload-artifact@v7
        with:
          name: package-qemu-uae-macos-universal
          path: dist/qemu-uae-macos-universal.zip
          if-no-files-found: error

  windows:
    name: Windows ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: windows-2025
            msystem: CLANG64
          - arch: arm64
            runner: windows-11-arm
            msystem: CLANGARM64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            base-devel
            ca-certificates
            curl
            git
            patch
            tar
            xz
          pacboy: >-
            clang:p
            glib2:p
            ninja:p
            pkgconf:p
            python:p
            zlib:p

      - name: Check script syntax
        shell: msys2 {0}
        run: bash -n build-qemu-uae-plugin.sh

      - name: Build plugin
        shell: msys2 {0}
        env:
          CC: clang
          CXX: clang++
        run: ./build-qemu-uae-plugin.sh --clean -j "$(nproc)" --output dist/qemu-uae.dll

      - name: Package release asset
        shell: pwsh
        run: |
          Compress-Archive -Path dist/qemu-uae.dll -DestinationPath "dist/qemu-uae-windows-${{ matrix.arch }}.zip" -Force

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v7
        with:
          name: qemu-uae-windows-${{ matrix.arch }}
          path: dist/qemu-uae.dll
          if-no-files-found: error

      - name: Upload release package
        uses: actions/upload-artifact@v7
        with:
          name: package-qemu-uae-windows-${{ matrix.arch }}
          path: dist/qemu-uae-windows-${{ matrix.arch }}.zip
          if-no-files-found: error

  release:
    name: Publish release
    runs-on: ubuntu-24.04
    needs:
      - linux
      - macos-universal
      - windows
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_release)
    permissions:
      contents: write

    steps:
      - name: Resolve release tag
        id: release
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ -z "${{ inputs.release_tag }}" ]]; then
              echo "release_tag is required when publish_release is true." >&2
              exit 1
            fi
            tag="${{ inputs.release_tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Download release packages
        uses: actions/download-artifact@v8
        with:
          pattern: package-qemu-uae-*
          path: release-assets
          merge-multiple: true

      - name: Generate checksums and release notes
        run: |
          cd release-assets
          sha256sum qemu-uae-* > SHA256SUMS
          cat > RELEASE-NOTES.md <<EOF
          QEMU-UAE PPC plugin artifacts for Amiberry.

          - QEMU: 11.0.1
          - QEMU-UAE API: 3.8
          - Source commit: ${GITHUB_SHA}
          - Code signing: handled by Amiberry packaging after the plugin is bundled

          Assets:
          - qemu-uae-linux-x86_64.tar.xz
          - qemu-uae-linux-aarch64.tar.xz
          - qemu-uae-macos-universal.zip
          - qemu-uae-windows-x64.zip
          - qemu-uae-windows-arm64.zip
          - SHA256SUMS
          EOF
          cat SHA256SUMS

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          DRAFT_RELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.draft_release }}
        run: |
          cd release-assets
          release_args=(
            "${RELEASE_TAG}"
            qemu-uae-linux-x86_64.tar.xz
            qemu-uae-linux-aarch64.tar.xz
            qemu-uae-macos-universal.zip
            qemu-uae-windows-x64.zip
            qemu-uae-windows-arm64.zip
            SHA256SUMS
            --title "QEMU-UAE PPC plugin ${RELEASE_TAG}"
            --notes-file RELEASE-NOTES.md
          )
          if [[ "${DRAFT_RELEASE}" == "true" ]]; then
            release_args+=(--draft)
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "QEMU-UAE PPC plugin ${RELEASE_TAG}" \
              --notes-file RELEASE-NOTES.md
            gh release upload "${RELEASE_TAG}" \
              qemu-uae-linux-x86_64.tar.xz \
              qemu-uae-linux-aarch64.tar.xz \
              qemu-uae-macos-universal.zip \
              qemu-uae-windows-x64.zip \
              qemu-uae-windows-arm64.zip \
              SHA256SUMS \
              --clobber
          else
            gh release create "${release_args[@]}" --target "${GITHUB_SHA}"
          fi
