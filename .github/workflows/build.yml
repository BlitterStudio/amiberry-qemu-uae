name: Build qemu-uae

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    name: Linux ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    container: ubuntu:22.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm

    steps:
      - name: Install checkout tools
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y ca-certificates git

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y \
            build-essential \
            curl \
            ninja-build \
            patch \
            pkg-config \
            python3 \
            python3-venv \
            xz-utils \
            libglib2.0-dev \
            libpixman-1-dev \
            zlib1g-dev

      - name: Check script syntax
        run: bash -n build-qemu-uae-plugin.sh

      - name: Build plugin
        run: ./build-qemu-uae-plugin.sh --clean -j "$(nproc)" --output dist/qemu-uae.so

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: qemu-uae-linux-${{ matrix.arch }}
          path: dist/qemu-uae.so
          if-no-files-found: error

  macos:
    name: macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          brew install ninja pkg-config glib

      - name: Check script syntax
        run: bash -n build-qemu-uae-plugin.sh

      - name: Build plugin
        run: ./build-qemu-uae-plugin.sh --clean -j "$(sysctl -n hw.ncpu)" --output dist/qemu-uae.dylib

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: qemu-uae-macos-${{ matrix.arch }}
          path: dist/qemu-uae.dylib
          if-no-files-found: error

  macos-universal:
    name: macOS universal
    runs-on: macos-15
    needs: macos

    steps:
      - name: Download x86_64 plugin
        uses: actions/download-artifact@v8
        with:
          name: qemu-uae-macos-x86_64
          path: artifacts/x86_64

      - name: Download arm64 plugin
        uses: actions/download-artifact@v8
        with:
          name: qemu-uae-macos-arm64
          path: artifacts/arm64

      - name: Create universal plugin
        run: |
          mkdir -p dist
          lipo -create \
            artifacts/x86_64/qemu-uae.dylib \
            artifacts/arm64/qemu-uae.dylib \
            -output dist/qemu-uae.dylib
          lipo -info dist/qemu-uae.dylib

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: qemu-uae-macos-universal
          path: dist/qemu-uae.dylib
          if-no-files-found: error

  windows:
    name: Windows ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: windows-2025
            msystem: CLANG64
          - arch: arm64
            runner: windows-11-arm
            msystem: CLANGARM64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            base-devel
            ca-certificates
            curl
            git
            patch
            tar
            xz
          pacboy: >-
            clang:p
            glib2:p
            ninja:p
            pkgconf:p
            python:p
            zlib:p

      - name: Check script syntax
        shell: msys2 {0}
        run: bash -n build-qemu-uae-plugin.sh

      - name: Build plugin
        shell: msys2 {0}
        env:
          CC: clang
          CXX: clang++
        run: ./build-qemu-uae-plugin.sh --clean -j "$(nproc)" --output dist/qemu-uae.dll

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: qemu-uae-windows-${{ matrix.arch }}
          path: dist/qemu-uae.dll
          if-no-files-found: error
